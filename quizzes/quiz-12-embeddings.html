<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz 12 — Tokenization & Embeddings</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; color: #e0e0e0; min-height: 100vh; padding: 2rem 1rem; }
    .container { max-width: 800px; margin: 0 auto; }
    h1 { text-align: center; margin-bottom: 0.5rem; font-size: 1.8rem; color: #ffffff; }
    .subtitle { text-align: center; color: #8892b0; margin-bottom: 2rem; font-size: 1rem; }
    .progress-bar-container { background: #0d1117; border-radius: 10px; height: 14px; margin-bottom: 2rem; overflow: hidden; }
    .progress-bar { background: linear-gradient(90deg, #0d6efd, #4dabf7); height: 100%; width: 0%; border-radius: 10px; transition: width 0.4s ease; }
    .progress-text { text-align: center; color: #8892b0; margin-bottom: 1rem; font-size: 0.9rem; }
    .card { background: #16213e; border-radius: 12px; padding: 2rem; margin-bottom: 1.5rem; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
    .question-label { font-size: 0.85rem; color: #4dabf7; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.5rem; }
    .question-text { font-size: 1.15rem; margin-bottom: 1.2rem; line-height: 1.5; color: #ffffff; }
    pre { background: #0d1117; border: 1px solid #30363d; border-radius: 8px; padding: 1rem; margin-bottom: 1.2rem; overflow-x: auto; font-size: 0.95rem; }
    code { font-family: 'Consolas', 'Fira Code', 'Courier New', monospace; color: #c9d1d9; }
    .options { list-style: none; }
    .options li { margin-bottom: 0.5rem; }
    .options label { display: flex; align-items: center; gap: 0.75rem; padding: 0.8rem 1rem; background: #0d1117; border: 2px solid #30363d; border-radius: 8px; cursor: pointer; transition: border-color 0.2s, background 0.2s; font-size: 1rem; }
    .options label:hover { border-color: #4dabf7; background: #1c2a4a; }
    .options input[type="radio"] { accent-color: #0d6efd; width: 18px; height: 18px; flex-shrink: 0; }
    .btn { display: inline-block; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s, transform 0.1s; }
    .btn-primary { background: #0d6efd; color: #fff; }
    .btn-primary:hover { background: #3b82f6; }
    .btn-primary:disabled { background: #374151; cursor: not-allowed; }
    .btn-restart { background: #238636; color: #fff; margin-top: 1rem; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; }
    .btn-restart:hover { background: #2ea043; }
    .feedback { margin-top: 1rem; padding: 1rem 1.2rem; border-radius: 8px; font-size: 0.95rem; line-height: 1.5; display: none; }
    .feedback.correct { background: #0f5132; border: 1px solid #198754; color: #d1fae5; display: block; }
    .feedback.wrong { background: #842029; border: 1px solid #dc3545; color: #fdd; display: block; }
    .score-card { text-align: center; padding: 3rem 2rem; }
    .score-card .score { font-size: 3rem; font-weight: 700; color: #4dabf7; margin-bottom: 0.5rem; }
    .score-card .score-label { font-size: 1.2rem; color: #8892b0; margin-bottom: 1.5rem; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Quiz 12 — Tokenization & Embeddings</h1>
    <p class="subtitle">BPE, similarite cosinus, vector stores et pgvector</p>
    <div class="progress-bar-container"><div class="progress-bar" id="progressBar"></div></div>
    <p class="progress-text" id="progressText">Question 1 / 5</p>
    <div id="quizContainer"></div>
    <div id="scoreContainer" class="card score-card hidden"></div>
  </div>
  <script>
    const questions = [
      {
        label: "Question 1 — BPE",
        text: "Comment fonctionne l'algorithme Byte Pair Encoding (BPE) pour la tokenization ?",
        code: null,
        options: [
          "Il decoupe le texte caractere par caractere",
          "Il fusionne iterativement les paires de tokens les plus frequentes",
          "Il utilise un dictionnaire fixe de mots complets",
          "Il applique des expressions regulieres pour separer les phrases"
        ],
        answer: 1,
        explanation: "BPE commence par des caracteres individuels puis fusionne iterativement les paires adjacentes les plus frequentes dans le corpus d'entrainement, construisant un vocabulaire de sous-mots."
      },
      {
        label: "Question 2 — Similarite cosinus",
        text: "Quelle est la plage de valeurs de la similarite cosinus et que signifie une valeur de 1 ?",
        code: null,
        options: [
          "De 0 a 1 — les vecteurs sont orthogonaux",
          "De -1 a 1 — les vecteurs pointent dans la meme direction",
          "De 0 a l'infini — les vecteurs sont identiques",
          "De -1 a 1 — les vecteurs sont opposes"
        ],
        answer: 1,
        explanation: "La similarite cosinus varie de -1 (opposes) a 1 (meme direction). Une valeur de 1 signifie que les deux vecteurs pointent exactement dans la meme direction, indiquant une similarite semantique maximale."
      },
      {
        label: "Question 3 — Vector stores",
        text: "Quel est le role principal d'un vector store dans un systeme utilisant des embeddings ?",
        code: null,
        options: [
          "Stocker le code source des modeles LLM",
          "Indexer et rechercher efficacement des vecteurs par similarite",
          "Compresser les modeles pour reduire la VRAM",
          "Gerer les sessions utilisateur et l'authentification"
        ],
        answer: 1,
        explanation: "Un vector store (base de donnees vectorielle) est optimise pour stocker des embeddings et effectuer des recherches de plus proches voisins (nearest neighbor search) de maniere efficace."
      },
      {
        label: "Question 4 — pgvector",
        text: "Quelle extension et quel type de donnees pgvector ajoute-t-il a PostgreSQL ?",
        code: null,
        options: [
          "L'extension 'vectordb' avec le type ARRAY",
          "L'extension 'vector' avec le type vector(n) pour stocker des embeddings",
          "L'extension 'embedding' avec le type JSONB",
          "L'extension 'pgml' avec le type FLOAT[]"
        ],
        answer: 1,
        explanation: "pgvector ajoute l'extension 'vector' a PostgreSQL avec le type vector(n) ou n est la dimension. On peut ensuite utiliser les operateurs <=> (cosine), <-> (L2) et <#> (inner product) pour les recherches."
      },
      {
        label: "Question 5 — HNSW",
        text: "Pourquoi l'index HNSW (Hierarchical Navigable Small World) est-il prefere pour la recherche vectorielle ?",
        code: null,
        options: [
          "Il garantit un resultat exact a 100% sans approximation",
          "Il offre un excellent compromis rapidite/precision pour les recherches approximatives de plus proches voisins",
          "Il compresse les vecteurs de 50% pour economiser l'espace disque",
          "Il ne fonctionne qu'avec des vecteurs de dimension 3"
        ],
        answer: 1,
        explanation: "HNSW est un algorithme de recherche approximative (ANN) qui construit un graphe navigable multi-couches. Il offre un excellent rappel (recall) proche de 100% avec des temps de requete tres rapides, bien meilleur que la recherche exhaustive sur de grands volumes."
      }
    ];
    let currentQuestion = 0, score = 0, answered = false;
    function renderQuestion() { const q = questions[currentQuestion]; const total = questions.length; document.getElementById('progressBar').style.width = ((currentQuestion / total) * 100) + '%'; document.getElementById('progressText').textContent = 'Question ' + (currentQuestion + 1) + ' / ' + total; let html = '<div class="card"><p class="question-label">' + q.label + '</p><p class="question-text">' + q.text + '</p>'; if (q.code) html += '<pre><code>' + q.code + '</code></pre>'; html += '<ul class="options">'; q.options.forEach(function(opt, i) { html += '<li><label><input type="radio" name="q" value="' + i + '"> ' + opt + '</label></li>'; }); html += '</ul><button class="btn btn-primary" id="validateBtn" onclick="validate()" disabled>Valider</button><div class="feedback" id="feedback"></div></div>'; document.getElementById('quizContainer').innerHTML = html; document.querySelectorAll('input[name="q"]').forEach(function(r) { r.addEventListener('change', function() { document.getElementById('validateBtn').disabled = false; }); }); answered = false; }
    function validate() { if (answered) { currentQuestion++; if (currentQuestion < questions.length) renderQuestion(); else showScore(); return; } answered = true; var selected = document.querySelector('input[name="q"]:checked'); if (!selected) return; var val = parseInt(selected.value); var q = questions[currentQuestion]; var fb = document.getElementById('feedback'); var btn = document.getElementById('validateBtn'); document.querySelectorAll('input[name="q"]').forEach(function(r) { r.disabled = true; }); if (val === q.answer) { score++; fb.className = 'feedback correct'; fb.innerHTML = '<strong>Correct !</strong> ' + q.explanation; } else { fb.className = 'feedback wrong'; fb.innerHTML = '<strong>Incorrect.</strong> ' + q.explanation; } btn.textContent = currentQuestion < questions.length - 1 ? 'Suivant' : 'Voir le score'; }
    function showScore() { document.getElementById('quizContainer').classList.add('hidden'); document.getElementById('progressBar').style.width = '100%'; document.getElementById('progressText').textContent = 'Termine !'; var sc = document.getElementById('scoreContainer'); sc.classList.remove('hidden'); var pct = Math.round((score / questions.length) * 100); var msg = pct === 100 ? 'Parfait !' : pct >= 60 ? 'Bien joue !' : 'Continuez a reviser !'; sc.innerHTML = '<div class="score">' + score + ' / ' + questions.length + '</div><div class="score-label">' + msg + ' (' + pct + '%)</div><button class="btn-restart" onclick="restart()">Recommencer</button>'; }
    function restart() { currentQuestion = 0; score = 0; answered = false; document.getElementById('scoreContainer').classList.add('hidden'); document.getElementById('quizContainer').classList.remove('hidden'); renderQuestion(); }
    renderQuestion();
  </script>
</body>
</html>
