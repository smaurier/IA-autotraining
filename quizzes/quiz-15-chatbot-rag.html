<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz — Chatbot RAG Full-Stack</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; color: #e0e0e0; min-height: 100vh; padding: 2rem 1rem; }
    .container { max-width: 800px; margin: 0 auto; }
    h1 { text-align: center; margin-bottom: 0.5rem; font-size: 1.8rem; color: #ffffff; }
    .subtitle { text-align: center; color: #8892b0; margin-bottom: 2rem; font-size: 1rem; }
    .progress-bar-container { background: #0d1117; border-radius: 10px; height: 14px; margin-bottom: 2rem; overflow: hidden; }
    .progress-bar { background: linear-gradient(90deg, #0d6efd, #4dabf7); height: 100%; width: 0%; border-radius: 10px; transition: width 0.4s ease; }
    .progress-text { text-align: center; color: #8892b0; margin-bottom: 1rem; font-size: 0.9rem; }
    .card { background: #16213e; border-radius: 12px; padding: 2rem; margin-bottom: 1.5rem; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
    .question-label { font-size: 0.85rem; color: #4dabf7; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.5rem; }
    .question-text { font-size: 1.15rem; margin-bottom: 1.2rem; line-height: 1.5; color: #ffffff; }
    pre { background: #0d1117; border: 1px solid #30363d; border-radius: 8px; padding: 1rem; margin-bottom: 1.2rem; overflow-x: auto; font-size: 0.95rem; }
    code { font-family: 'Consolas', 'Fira Code', 'Courier New', monospace; color: #c9d1d9; }
    .options { list-style: none; }
    .options li { margin-bottom: 0.5rem; }
    .options label { display: flex; align-items: center; gap: 0.75rem; padding: 0.8rem 1rem; background: #0d1117; border: 2px solid #30363d; border-radius: 8px; cursor: pointer; transition: border-color 0.2s, background 0.2s; font-size: 1rem; }
    .options label:hover { border-color: #4dabf7; background: #1c2a4a; }
    .options input[type="radio"] { accent-color: #0d6efd; width: 18px; height: 18px; flex-shrink: 0; }
    .btn { display: inline-block; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s, transform 0.1s; }
    .btn-primary { background: #0d6efd; color: #fff; }
    .btn-primary:hover { background: #3b82f6; }
    .btn-primary:disabled { background: #374151; cursor: not-allowed; }
    .btn-restart { background: #238636; color: #fff; margin-top: 1rem; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; }
    .btn-restart:hover { background: #2ea043; }
    .feedback { margin-top: 1rem; padding: 1rem 1.2rem; border-radius: 8px; font-size: 0.95rem; line-height: 1.5; display: none; }
    .feedback.correct { background: #0f5132; border: 1px solid #198754; color: #d1fae5; display: block; }
    .feedback.wrong { background: #842029; border: 1px solid #dc3545; color: #fdd; display: block; }
    .score-card { text-align: center; padding: 3rem 2rem; }
    .score-card .score { font-size: 3rem; font-weight: 700; color: #4dabf7; margin-bottom: 0.5rem; }
    .score-card .score-label { font-size: 1.2rem; color: #8892b0; margin-bottom: 1.5rem; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Quiz — Chatbot RAG Full-Stack</h1>
    <p class="subtitle">NestJS, pgvector, streaming SSE, historique de conversation et citations</p>
    <div class="progress-bar-container"><div class="progress-bar" id="progressBar"></div></div>
    <p class="progress-text" id="progressText">Question 1 / 5</p>
    <div id="quizContainer"></div>
    <div id="scoreContainer" class="card score-card hidden"></div>
  </div>
  <script>
    const questions = [
      {
        label: "Question 1 — Streaming SSE",
        text: "Pourquoi utilise-t-on le streaming SSE (Server-Sent Events) plutot qu'une reponse HTTP classique pour un chatbot RAG ?",
        code: null,
        options: [
          "SSE permet d'envoyer des fichiers binaires plus rapidement",
          "SSE affiche les tokens au fur et a mesure de leur generation, reduisant le temps d'attente percu par l'utilisateur",
          "SSE est obligatoire pour communiquer avec les LLMs",
          "SSE consomme moins de bande passante qu'une requete HTTP classique"
        ],
        answer: 1,
        explanation: "Le streaming SSE envoie chaque token genere par le LLM au client des qu'il est disponible. L'utilisateur voit la reponse s'ecrire progressivement au lieu d'attendre plusieurs secondes une reponse complete. Cela ameliore considerablement l'experience utilisateur (le temps percu est reduit d'environ 80%)."
      },
      {
        label: "Question 2 — pgvector et HNSW",
        text: "Quel est le role de l'index HNSW dans pgvector ?",
        code: null,
        options: [
          "Il compresse les vecteurs pour economiser de l'espace disque",
          "Il permet une recherche de similarite rapide en construisant un graphe de voisins multi-niveaux",
          "Il convertit automatiquement le texte en embeddings",
          "Il gere la replication des donnees entre plusieurs instances PostgreSQL"
        ],
        answer: 1,
        explanation: "HNSW (Hierarchical Navigable Small World) est un algorithme d'indexation qui construit un graphe multi-niveaux permettant de trouver les vecteurs les plus proches sans scanner toute la table. Cela rend la recherche de similarite cosinus beaucoup plus rapide (sub-lineaire) sur de grandes collections."
      },
      {
        label: "Question 3 — Gestion de l'historique",
        text: "Comment gere-t-on le context window limite du LLM lors de conversations longues dans un chatbot RAG ?",
        code: null,
        options: [
          "On envoie systematiquement tout l'historique, le LLM gere automatiquement",
          "On tronque l'historique aux N derniers messages et on resume les messages plus anciens",
          "On cree une nouvelle conversation a chaque message",
          "On augmente la temperature pour compenser le manque de contexte"
        ],
        answer: 1,
        explanation: "Le context window est limite (128K-200K tokens). Pour les conversations longues, on garde les N derniers messages en entier et on resume les messages anterieurs. Cela preserve le contexte recent tout en gardant une trace des echanges precedents sans depasser la limite de tokens."
      },
      {
        label: "Question 4 — Pipeline d'ingestion",
        text: "Quel est l'ordre correct des etapes dans un pipeline d'ingestion de documents pour un chatbot RAG ?",
        code: null,
        options: [
          "Embedding → Upload → Chunking → Stockage pgvector",
          "Upload → Chunking → Embedding → Stockage pgvector",
          "Chunking → Upload → Stockage pgvector → Embedding",
          "Upload → Stockage pgvector → Chunking → Embedding"
        ],
        answer: 1,
        explanation: "Le pipeline d'ingestion suit un ordre logique : 1) Upload du fichier, 2) Chunking (decoupage en morceaux), 3) Embedding (transformation de chaque chunk en vecteur via un modele comme nomic-embed-text), 4) Stockage dans pgvector avec les metadonnees. Chaque etape depend de la precedente."
      },
      {
        label: "Question 5 — Citations et tracabilite",
        text: "Pourquoi les citations des sources sont-elles essentielles dans un chatbot RAG ?",
        code: null,
        options: [
          "Elles ameliorent le SEO de l'application",
          "Elles permettent a l'utilisateur de verifier l'information et augmentent la confiance dans les reponses",
          "Elles sont obligatoires pour que le LLM fonctionne correctement",
          "Elles reduisent le nombre de tokens utilises dans la reponse"
        ],
        answer: 1,
        explanation: "Les citations permettent la tracabilite : l'utilisateur peut verifier l'information a la source, ce qui augmente la confiance dans les reponses. C'est aussi un mecanisme de transparence qui aide a detecter les hallucinations du LLM en comparant la reponse avec les sources citees."
      }
    ];
    let currentQuestion = 0, score = 0, answered = false;
    function renderQuestion() {
      const q = questions[currentQuestion]; const total = questions.length;
      document.getElementById('progressBar').style.width = ((currentQuestion / total) * 100) + '%';
      document.getElementById('progressText').textContent = 'Question ' + (currentQuestion + 1) + ' / ' + total;
      let html = '<div class="card"><p class="question-label">' + q.label + '</p><p class="question-text">' + q.text + '</p>';
      if (q.code) html += '<pre><code>' + q.code + '</code></pre>';
      html += '<ul class="options">';
      q.options.forEach(function(opt, i) { html += '<li><label><input type="radio" name="q" value="' + i + '"> ' + opt + '</label></li>'; });
      html += '</ul><button class="btn btn-primary" id="validateBtn" onclick="validate()" disabled>Valider</button><div class="feedback" id="feedback"></div></div>';
      document.getElementById('quizContainer').innerHTML = html;
      document.querySelectorAll('input[name="q"]').forEach(function(r) { r.addEventListener('change', function() { document.getElementById('validateBtn').disabled = false; }); });
      answered = false;
    }
    function validate() {
      if (answered) { currentQuestion++; if (currentQuestion < questions.length) renderQuestion(); else showScore(); return; }
      answered = true;
      var selected = document.querySelector('input[name="q"]:checked'); if (!selected) return;
      var val = parseInt(selected.value); var q = questions[currentQuestion];
      var fb = document.getElementById('feedback'); var btn = document.getElementById('validateBtn');
      document.querySelectorAll('input[name="q"]').forEach(function(r) { r.disabled = true; });
      if (val === q.answer) { score++; fb.className = 'feedback correct'; fb.innerHTML = '<strong>Correct !</strong> ' + q.explanation; }
      else { fb.className = 'feedback wrong'; fb.innerHTML = '<strong>Incorrect.</strong> ' + q.explanation; }
      btn.textContent = currentQuestion < questions.length - 1 ? 'Suivant' : 'Voir le score';
    }
    function showScore() {
      document.getElementById('quizContainer').classList.add('hidden');
      document.getElementById('progressBar').style.width = '100%';
      document.getElementById('progressText').textContent = 'Termine !';
      var sc = document.getElementById('scoreContainer'); sc.classList.remove('hidden');
      var pct = Math.round((score / questions.length) * 100);
      var msg = pct === 100 ? 'Parfait !' : pct >= 60 ? 'Bien joue !' : 'Continuez a reviser !';
      sc.innerHTML = '<div class="score">' + score + ' / ' + questions.length + '</div><div class="score-label">' + msg + ' (' + pct + '%)</div><button class="btn-restart" onclick="restart()">Recommencer</button>';
    }
    function restart() { currentQuestion = 0; score = 0; answered = false; document.getElementById('scoreContainer').classList.add('hidden'); document.getElementById('quizContainer').classList.remove('hidden'); renderQuestion(); }
    renderQuestion();
  </script>
</body>
</html>
