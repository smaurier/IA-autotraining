<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Quiz — Frameworks agentiques : LangGraph, CrewAI</title><style>*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:#1a1a2e;color:#e0e0e0;min-height:100vh;padding:2rem 1rem}.container{max-width:800px;margin:0 auto}h1{text-align:center;margin-bottom:.5rem;font-size:1.8rem;color:#fff}.subtitle{text-align:center;color:#8892b0;margin-bottom:2rem;font-size:1rem}.progress-bar-container{background:#0d1117;border-radius:10px;height:14px;margin-bottom:2rem;overflow:hidden}.progress-bar{background:linear-gradient(90deg,#0d6efd,#4dabf7);height:100%;width:0%;border-radius:10px;transition:width .4s ease}.progress-text{text-align:center;color:#8892b0;margin-bottom:1rem;font-size:.9rem}.card{background:#16213e;border-radius:12px;padding:2rem;margin-bottom:1.5rem;box-shadow:0 4px 20px rgba(0,0,0,.3)}.question-label{font-size:.85rem;color:#4dabf7;text-transform:uppercase;letter-spacing:1px;margin-bottom:.5rem}.question-text{font-size:1.15rem;margin-bottom:1.2rem;line-height:1.5;color:#fff}pre{background:#0d1117;border:1px solid #30363d;border-radius:8px;padding:1rem;margin-bottom:1.2rem;overflow-x:auto;font-size:.95rem}code{font-family:'Consolas','Fira Code','Courier New',monospace;color:#c9d1d9}.options{list-style:none}.options li{margin-bottom:.5rem}.options label{display:flex;align-items:center;gap:.75rem;padding:.8rem 1rem;background:#0d1117;border:2px solid #30363d;border-radius:8px;cursor:pointer;transition:border-color .2s,background .2s;font-size:1rem}.options label:hover{border-color:#4dabf7;background:#1c2a4a}.options input[type=radio]{accent-color:#0d6efd;width:18px;height:18px;flex-shrink:0}.btn{display:inline-block;padding:.7rem 2rem;border:none;border-radius:8px;font-size:1rem;font-weight:600;cursor:pointer;transition:background .2s,transform .1s}.btn-primary{background:#0d6efd;color:#fff}.btn-primary:hover{background:#3b82f6}.btn-primary:disabled{background:#374151;cursor:not-allowed}.btn-restart{background:#238636;color:#fff;margin-top:1rem;padding:.7rem 2rem;border:none;border-radius:8px;font-size:1rem;font-weight:600;cursor:pointer}.btn-restart:hover{background:#2ea043}.feedback{margin-top:1rem;padding:1rem 1.2rem;border-radius:8px;font-size:.95rem;line-height:1.5;display:none}.feedback.correct{background:#0f5132;border:1px solid #198754;color:#d1fae5;display:block}.feedback.wrong{background:#842029;border:1px solid #dc3545;color:#fdd;display:block}.score-card{text-align:center;padding:3rem 2rem}.score-card .score{font-size:3rem;font-weight:700;color:#4dabf7;margin-bottom:.5rem}.score-card .score-label{font-size:1.2rem;color:#8892b0;margin-bottom:1.5rem}.hidden{display:none}</style></head><body><div class="container"><h1>Quiz — Frameworks agentiques</h1><p class="subtitle">Module 20 — LangGraph, CrewAI et orchestration avancee</p><div class="progress-bar-container"><div class="progress-bar" id="progressBar"></div></div><p class="progress-text" id="progressText">Question 1 / 5</p><div id="quizContainer"></div><div id="scoreContainer" class="card score-card hidden"></div></div><script>const questions=[{label:"Question 1 — Agents vs chaînes",text:"Quelle est la difference fondamentale entre une chaîne (chain) et un agent dans le contexte des LLMs ?",options:["Une chaîne utilise plusieurs LLMs, un agent n'en utilise qu'un seul","Un agent utilise un LLM pour decider dynamiquement quelle action executer a chaque etape, alors qu'une chaîne suit un flux lineaire predetermine","Une chaîne est plus lente qu'un agent","Un agent ne peut pas utiliser d'outils externes"],answer:1,explanation:"Une chaîne est un pipeline lineaire (input, etape 1, etape 2, output) dont l'ordre est fixe et connu a l'avance. Un agent utilise un LLM pour decider dynamiquement quelle action executer, le flux n'est pas predetermine."},{label:"Question 2 — LangGraph concepts",text:"Dans LangGraph, qu'est-ce qu'un <em>Conditional Edge</em> ?",options:["Une connexion qui supprime un noeud du graphe","Un noeud special qui termine l'execution du graphe","Une arete dont la destination est determinee dynamiquement (par exemple par le LLM) selon l'etat courant","Une arete qui connecte toujours deux noeuds identiques"],answer:2,explanation:"Un Conditional Edge est un branchement dynamique dans le graphe d'etats de LangGraph. La destination est determinee a l'execution en fonction de l'etat courant — c'est typiquement le LLM qui decide s'il faut appeler un outil ou terminer."},{label:"Question 3 — Quand utiliser un framework agentique",text:"Dans quelle situation est-il recommande de passer a un framework agentique plutot qu'un agent simple ?",options:["Quand on a un flux previsible avec peu d'etapes","Quand on a besoin de collaboration multi-agent, de human-in-the-loop natif ou de graphes complexes avec persistence d'etat","Quand on veut minimiser la latence et le cout","Quand on n'a qu'un seul outil a appeler"],answer:1,explanation:"Les frameworks agentiques comme LangGraph sont ideaux pour la collaboration multi-agent, le human-in-the-loop natif, les graphes complexes avec persistence d'etat et le debugging integre. Pour un flux simple, une chaîne suffit."},{label:"Question 4 — LangGraph State",text:"Dans LangGraph, comment fonctionne le <code>State</code> avec un <code>reducer</code> sur le champ messages ?",code:"const AgentState = Annotation.Root({\n    messages: Annotation&lt;BaseMessage[]&gt;({\n        reducer: (prev, next) =&gt; [...prev, ...next],\n        default: () =&gt; [],\n    }),\n});",options:["Le reducer remplace les anciens messages par les nouveaux","Le reducer accumule les messages : les nouveaux sont ajoutes a la suite des precedents","Le reducer ne garde que le dernier message","Le reducer trie les messages par date"],answer:1,explanation:"Le reducer <code>(prev, next) =&gt; [...prev, ...next]</code> accumule les messages : chaque noeud ajoute ses nouveaux messages a la suite des precedents. Cela permet de construire l'historique de conversation au fil des etapes du graphe."},{label:"Question 5 — Patterns d'orchestration",text:"Quel pattern d'orchestration multi-agent utilise un agent superviseur qui decide quel agent specialise doit traiter chaque sous-tache ?",options:["Pattern sequentiel","Pattern parallele","Pattern hierarchique / superviseur","Pattern chaîne simple"],answer:2,explanation:"Le pattern hierarchique (ou superviseur) utilise un agent superviseur qui analyse la tache, la decompose et decide quel agent specialise doit traiter chaque sous-tache. C'est ideal quand les taches necessitent des competences differentes et qu'un routage intelligent est necessaire."}];let currentQuestion=0,score=0,answered=false;function renderQuestion(){const q=questions[currentQuestion],total=questions.length;document.getElementById('progressBar').style.width=((currentQuestion/total)*100)+'%';document.getElementById('progressText').textContent=`Question ${currentQuestion+1} / ${total}`;let html=`<div class="card"><p class="question-label">${q.label}</p><p class="question-text">${q.text}</p>`;if(q.code)html+=`<pre><code>${q.code}</code></pre>`;html+=`<ul class="options">`;q.options.forEach((opt,i)=>{html+=`<li><label><input type="radio" name="q" value="${i}"> ${opt}</label></li>`;});html+=`</ul><button class="btn btn-primary" id="validateBtn" onclick="validate()" disabled>Valider</button><div class="feedback" id="feedback"></div></div>`;document.getElementById('quizContainer').innerHTML=html;document.querySelectorAll('input[name="q"]').forEach(r=>{r.addEventListener('change',()=>{document.getElementById('validateBtn').disabled=false;});});answered=false;}function validate(){if(answered){currentQuestion++;if(currentQuestion<questions.length)renderQuestion();else showScore();return;}answered=true;const selected=document.querySelector('input[name="q"]:checked');if(!selected)return;const val=parseInt(selected.value),q=questions[currentQuestion];const fb=document.getElementById('feedback'),btn=document.getElementById('validateBtn');document.querySelectorAll('input[name="q"]').forEach(r=>r.disabled=true);if(val===q.answer){score++;fb.className='feedback correct';fb.innerHTML=`<strong>Correct !</strong> ${q.explanation}`;}else{fb.className='feedback wrong';fb.innerHTML=`<strong>Incorrect.</strong> ${q.explanation}`;}btn.textContent=currentQuestion<questions.length-1?'Suivant':'Voir le score';}function showScore(){document.getElementById('quizContainer').classList.add('hidden');document.getElementById('progressBar').style.width='100%';document.getElementById('progressText').textContent='Termine !';const sc=document.getElementById('scoreContainer');sc.classList.remove('hidden');const pct=Math.round((score/questions.length)*100);let msg=pct===100?'Parfait !':pct>=60?'Bien joue !':'Continuez a reviser !';sc.innerHTML=`<div class="score">${score} / ${questions.length}</div><div class="score-label">${msg} (${pct}%)</div><button class="btn-restart" onclick="restart()">Recommencer</button>`;}function restart(){currentQuestion=0;score=0;answered=false;document.getElementById('scoreContainer').classList.add('hidden');document.getElementById('quizContainer').classList.remove('hidden');renderQuestion();}renderQuestion();</script></body></html>
